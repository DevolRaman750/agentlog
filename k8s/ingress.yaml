apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: agentlog
  namespace: agentlog
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
spec:
  ingressClassName: nginx
  rules:
    - host: agentlog.scalebase.io
      http:
        paths:
          - path: /health
            pathType: Exact
            backend:
              service:
                name: agentlog-backend
                port:
                  number: 80
          - path: /test
            pathType: Exact
            backend:
              service:
                name: agentlog-backend
                port:
                  number: 80
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: agentlog-backend
                port:
                  number: 80
          - path: /
            pathType: Prefix
            backend:
              service:
                name: agentlog-frontend
                port:
                  number: 80
  tls:
    - hosts:
        - agentlog.scalebase.io
      secretName: agentlog-tls 