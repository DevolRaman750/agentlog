apiVersion: apps/v1
kind: Deployment
metadata:
  name: agentlog-backend
  namespace: agentlog
  labels:
    app: agentlog-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: agentlog-backend
  template:
    metadata:
      labels:
        app: agentlog-backend
    spec:
      containers:
        - name: backend
          image: registry.digitalocean.com/resourceloop/agentlog/backend:846ff14-20250825-203011
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: agentlog-config
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
      imagePullSecrets:
        - name: umi-backend 