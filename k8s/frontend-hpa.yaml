apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: agentlog-frontend-hpa
  namespace: agentlog
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: agentlog-frontend
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70 