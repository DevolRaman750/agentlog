version: "2"
run:
  issues-exit-code: 1
  tests: false
linters:
  enable:
    - bodyclose
    - depguard
    - dogsled
    - exhaustive
    - gochecknoinits
    - gocritic
    - goprintffuncname
    - gosec
    - misspell
    - nakedret
    - nolintlint
    - revive
    - rowserrcheck
    - staticcheck
    - unconvert
    - unparam
    - whitespace
  disable:
    - dupl
    - funlen
    - goconst
    - gocyclo
    - lll
    - mnd
    - prealloc
    # noctx: golangci-lint v2's noctx is far stricter than the v1.64.8 baseline
    # (it flags every database/sql call and http.NewRequest made without a
    # context). It reported 0 issues under v1, so it was never actually
    # enforced; disabled here to keep the v1->v2 upgrade (required for go1.25)
    # parity-preserving. Re-enable and plumb contexts in a dedicated follow-up.
    - noctx
  settings:
    depguard:
      rules:
        main:
          allow:
            - $gostd
            - github.com/go-sql-driver/mysql
            - github.com/stretchr/testify
            - github.com/golang-migrate/migrate
            - github.com/google/uuid
            - google.golang.org/grpc
            - google.golang.org/protobuf
            - github.com/joho/godotenv
            - github.com/imran31415/gracewrap
            - github.com/golang-jwt/jwt
            - golang.org/x/crypto
            - gogent
          deny:
            - pkg: github.com/example/forbidden
              desc: This package is forbidden
    funlen:
      lines: 160
      statements: 100
    goconst:
      min-len: 2
      min-occurrences: 2
    gocritic:
      disabled-checks:
        - dupImport
        - ifElseChain
        - octalLiteral
        - whyNoLint
        - wrapperFunc
        - paramTypeCombine
        - rangeValCopy
        - nestingReduce
        - typeAssertChain
        - httpNoBody
        - hugeParam
        - elseif
        # importShadow: opinionated/experimental check newly enforced by v2;
        # not flagged by the v1.64.8 baseline. Disabled for upgrade parity.
        - importShadow
      enabled-tags:
        - diagnostic
        - experimental
        - opinionated
        - performance
        - style
    gocyclo:
      min-complexity: 50
    gosec:
      excludes:
        - G101
        - G112
        - G115
        - G201
        - G202
        - G401
        - G501
        # G706 (log injection via taint analysis) is a new rule in the gosec
        # version bundled with golangci-lint v2; not flagged by the v1.64.8
        # baseline. Excluded for upgrade parity.
        - G706
    staticcheck:
      # v2 enables the staticcheck "QF" (quickfix) family by default; these are
      # stylistic auto-fix suggestions the v1.64.8 baseline did not enforce.
      # Keep all other staticcheck analyzers; drop only the QF quickfixes.
      checks:
        - all
        - -QF1003
        - -QF1008
        - -QF1012
    govet:
      settings:
        printf:
          funcs:
            - (github.com/golangci/golangci-lint/pkg/logutils.Log).Infof
            - (github.com/golangci/golangci-lint/pkg/logutils.Log).Warnf
            - (github.com/golangci/golangci-lint/pkg/logutils.Log).Errorf
            - (github.com/golangci/golangci-lint/pkg/logutils.Log).Fatalf
    lll:
      line-length: 160
    misspell:
      locale: US
  exclusions:
    generated: lax
    rules:
      - linters:
          - funlen
          - gocyclo
          - mnd
        path: vendor/
      - linters:
          - funlen
          - gocyclo
          - mnd
        path: node_modules/
      - linters:
          - funlen
          - gocyclo
          - mnd
        path: frontend/node_modules/
      - linters:
          - funlen
          - gocyclo
          - mnd
        path: frontend/dist/
      - linters:
          - funlen
          - gocyclo
          - mnd
        path: bin/
      - linters:
          - funlen
          - gocyclo
          - mnd
        path: coverage-reports/
      - linters:
          - errcheck
          - funlen
          - goconst
          - gocritic
          - gocyclo
          - gosec
          - govet
          - ineffassign
          - misspell
          - mnd
          - nakedret
          - noctx
          - nolintlint
          - revive
          - rowserrcheck
          - staticcheck
          - unconvert
          - unparam
          - unused
          - whitespace
        path: .*\.pb\.go$
      - linters:
          - errcheck
          - funlen
          - goconst
          - gocritic
          - gocyclo
          - gosec
          - govet
          - ineffassign
          - misspell
          - mnd
          - nakedret
          - noctx
          - nolintlint
          - revive
          - rowserrcheck
          - staticcheck
          - unconvert
          - unparam
          - unused
          - whitespace
        path: _test\.go
      - linters:
          - gochecknoinits
        path: cmd/
      - linters:
          - golint
          - gosec
        path: proto/
      - linters:
          - errcheck
        text: Error return value of .((os\.)?std(out|err)\..*|.*Close|.*Flush|os\.Remove(All)?|.*printf?|os\.(Un)?Setenv). is not checked
      - linters:
          - revive
        text: exported (.+) should have comment or be unexported
      - linters:
          - revive
        text: should have a package comment
      - linters:
          - revive
        text: comment on exported
      - linters:
          - staticcheck
        text: ST1000
      - linters:
          - staticcheck
        text: at least one file in a package should have a package comment
      - linters:
          - revive
        text: exported const .* should have comment
      - linters:
          - revive
        text: 'exported: exported const .* should have comment \(or a comment on this block\) or be unexported'
    paths:
      - .*\.pb\.go$
      - .*_test\.go$
      - vendor
      - coverage-reports
      - third_party$
      - builtin$
      - examples$
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - gogent
  exclusions:
    generated: lax
    paths:
      - .*\.pb\.go$
      - .*_test\.go$
      - vendor
      - coverage-reports
      - third_party$
      - builtin$
      - examples$
