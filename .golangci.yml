run:
  timeout: 5m
  issues-exit-code: 1
  tests: true

linters-settings:
  gocyclo:
    min-complexity: 15
  goconst:
    min-len: 2
    min-occurrences: 2
  misspell:
    locale: US
  lll:
    line-length: 120
  goimports:
    local-prefixes: gogent
  gocritic:
    enabled-tags:
      - diagnostic
      - experimental
      - opinionated
      - performance
      - style
    disabled-checks:
      - dupImport
      - ifElseChain
      - octalLiteral
      - whyNoLint
      - wrapperFunc
  govet:
    settings:
      printf:
        funcs:
          - (github.com/golangci/golangci-lint/pkg/logutils.Log).Infof
          - (github.com/golangci/golangci-lint/pkg/logutils.Log).Warnf
          - (github.com/golangci/golangci-lint/pkg/logutils.Log).Errorf
          - (github.com/golangci/golangci-lint/pkg/logutils.Log).Fatalf

linters:
  enable:
    - bodyclose
    - deadcode
    - depguard
    - dogsled
    - dupl
    - errcheck
    - exportloopref
    - exhaustive
    - funlen
    - gochecknoinits
    - goconst
    - gocritic
    - gocyclo
    - gofmt
    - goimports
    - golint
    - gomnd
    - goprintffuncname
    - gosec
    - gosimple
    - govet
    - ineffassign
    - lll
    - misspell
    - nakedret
    - noctx
    - nolintlint
    - rowserrcheck
    - staticcheck
    - structcheck
    - stylecheck
    - typecheck
    - unconvert
    - unparam
    - unused
    - varcheck
    - whitespace

  disable:
    - maligned
    - prealloc
    - scopelint

issues:
  exclude-rules:
    - path: vendor/
      linters:
        - gomnd
        - funlen
        - gocyclo
    - path: node_modules/
      linters:
        - gomnd
        - funlen
        - gocyclo
    - path: frontend/node_modules/
      linters:
        - gomnd
        - funlen
        - gocyclo
    - path: frontend/dist/
      linters:
        - gomnd
        - funlen
        - gocyclo
    - path: bin/
      linters:
        - gomnd
        - funlen
        - gocyclo
    - path: coverage-reports/
      linters:
        - gomnd
        - funlen
        - gocyclo
    - path: ".*\\.pb\\.go$"
      linters:
        - gomnd
        - funlen
        - gocyclo
    - path: _test\.go
      linters:
        - gomnd
        - funlen
        - gocyclo
    - path: cmd/
      linters:
        - gochecknoinits
    - path: proto/
      linters:
        - golint
        - gosec
    - text: "Error return value of .((os\\.)?std(out|err)\\..*|.*Close|.*Flush|os\\.Remove(All)?|.*printf?|os\\.(Un)?Setenv). is not checked"
      linters:
        - errcheck
    - text: "exported (.+) should have comment or be unexported"
      linters:
        - golint
    - text: "should have a package comment"
      linters:
        - golint
    - text: "comment on exported"
      linters:
        - golint

  exclude-use-default: false
  max-issues-per-linter: 0
  max-same-issues: 0
