run:
  timeout: 5m
  issues-exit-code: 1
  tests: false

linters-settings:
  gocyclo:
    min-complexity: 50
  goconst:
    min-len: 2
    min-occurrences: 2
  funlen:
    lines: 160
    statements: 100
  misspell:
    locale: US
  lll:
    line-length: 160
  goimports:
    local-prefixes: gogent
  gocritic:
    enabled-tags:
      - diagnostic
      - experimental
      - opinionated
      - performance
      - style
    disabled-checks:
      - dupImport
      - ifElseChain
      - octalLiteral
      - whyNoLint
      - wrapperFunc
      - paramTypeCombine
      - rangeValCopy
      - nestingReduce
      - typeAssertChain
      - httpNoBody
      - hugeParam
      - elseif
  govet:
    settings:
      printf:
        funcs:
          - (github.com/golangci/golangci-lint/pkg/logutils.Log).Infof
          - (github.com/golangci/golangci-lint/pkg/logutils.Log).Warnf
          - (github.com/golangci/golangci-lint/pkg/logutils.Log).Errorf
          - (github.com/golangci/golangci-lint/pkg/logutils.Log).Fatalf
  gosec:
    excludes:
      - G101  # Potential hardcoded credentials (suppressed for dev/test)
      - G112  # Slowloris (http.Server ReadHeaderTimeout)
      - G115  # Integer overflow conversion warnings
      - G201  # SQL string formatting
      - G202  # SQL string concatenation
      - G401  # Weak cryptographic primitives
      - G501  # Blocklisted import crypto/md5
  depguard:
    rules:
      main:
        deny:
          - pkg: "github.com/example/forbidden"
            desc: "This package is forbidden"
        allow:
          - $gostd
          - github.com/go-sql-driver/mysql
          - github.com/stretchr/testify
          - github.com/golang-migrate/migrate
          - github.com/google/uuid
          - google.golang.org/grpc
          - google.golang.org/protobuf
          - github.com/joho/godotenv
          - github.com/imran31415/gracewrap
          - github.com/golang-jwt/jwt
          - golang.org/x/crypto
          - gogent

linters:
  enable:
    - bodyclose
    - depguard
    - dogsled
    - errcheck
    - exhaustive
    - gochecknoinits
    - gocritic
    - gofmt
    - goimports
    - goprintffuncname
    - gosec
    - gosimple
    - govet
    - ineffassign
    - misspell
    - nakedret
    - noctx
    - nolintlint
    - revive
    - rowserrcheck
    - staticcheck
    - stylecheck
    - typecheck
    - unconvert
    - unparam
    - unused
    - whitespace

  disable:
    - prealloc
    - dupl
    - gocyclo
    - funlen
    - goconst
    - lll
    - mnd

issues:
  exclude-use-default: false
  max-issues-per-linter: 0
  max-same-issues: 0
  exclude-dirs:
    - vendor
    - coverage-reports
  exclude-files:
    - ".*\\.pb\\.go$"
    - ".*_test\\.go$"
  
  exclude-rules:
    - path: vendor/
      linters:
        - mnd
        - funlen
        - gocyclo
    - path: node_modules/
      linters:
        - mnd
        - funlen
        - gocyclo
    - path: frontend/node_modules/
      linters:
        - mnd
        - funlen
        - gocyclo
    - path: frontend/dist/
      linters:
        - mnd
        - funlen
        - gocyclo
    - path: bin/
      linters:
        - mnd
        - funlen
        - gocyclo
    - path: coverage-reports/
      linters:
        - mnd
        - funlen
        - gocyclo
    - path: ".*\\.pb\\.go$"
      linters:
        - mnd
        - funlen
        - gocyclo
        - revive
        - errcheck
        - goconst
        - unparam
        - typecheck
        - gosec
        - noctx
        - rowserrcheck
        - stylecheck
        - gocritic
        - gosimple
        - govet
        - ineffassign
        - misspell
        - nakedret
        - nolintlint
        - staticcheck
        - unconvert
        - unused
        - whitespace
    - path: _test\.go
      linters:
        - mnd
        - funlen
        - gocyclo
        - revive
        - errcheck
        - goconst
        - unparam
        - typecheck
        - gosec
        - noctx
        - rowserrcheck
        - stylecheck
        - gocritic
        - gosimple
        - govet
        - ineffassign
        - misspell
        - nakedret
        - nolintlint
        - staticcheck
        - unconvert
        - unused
        - whitespace
    - path: cmd/
      linters:
        - gochecknoinits
    - path: proto/
      linters:
        - golint
        - gosec
    - text: "Error return value of .((os\\.)?std(out|err)\\..*|.*Close|.*Flush|os\\.Remove(All)?|.*printf?|os\\.(Un)?Setenv). is not checked"
      linters:
        - errcheck
    - text: "exported (.+) should have comment or be unexported"
      linters:
        - revive
    - text: "should have a package comment"
      linters:
        - revive
    - text: "comment on exported"
      linters:
        - revive
    - text: "ST1000"
      linters:
        - stylecheck
    - text: "at least one file in a package should have a package comment"
      linters:
        - stylecheck
    - text: "exported const .* should have comment"
      linters:
        - revive
    - text: "exported: exported const .* should have comment \\(or a comment on this block\\) or be unexported"
      linters:
        - revive
