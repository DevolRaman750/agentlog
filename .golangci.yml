run:
  timeout: 5m
  issues-exit-code: 1
  tests: false

issues:
  exclude-dirs:
    - vendor
    - coverage-reports
  exclude-files:
    - ".*\\.pb\\.go$"
    - ".*_test\\.go$"

linters-settings:
  gocyclo:
    min-complexity: 15
  goconst:
    min-len: 2
    min-occurrences: 2
  misspell:
    locale: US
  lll:
    line-length: 120
  goimports:
    local-prefixes: gogent
  gocritic:
    enabled-tags:
      - diagnostic
      - experimental
      - opinionated
      - performance
      - style
    disabled-checks:
      - dupImport
      - ifElseChain
      - octalLiteral
      - whyNoLint
      - wrapperFunc
  govet:
    settings:
      printf:
        funcs:
          - (github.com/golangci/golangci-lint/pkg/logutils.Log).Infof
          - (github.com/golangci/golangci-lint/pkg/logutils.Log).Warnf
          - (github.com/golangci/golangci-lint/pkg/logutils.Log).Errorf
          - (github.com/golangci/golangci-lint/pkg/logutils.Log).Fatalf
  depguard:
    rules:
      main:
        packages:
          - github.com/go-sql-driver/mysql
          - github.com/stretchr/testify/assert
          - github.com/stretchr/testify/require
          - github.com/golang-migrate/migrate/v4
          - github.com/golang-migrate/migrate/v4/database/mysql
          - github.com/google/uuid
          - google.golang.org/grpc/status
          - google.golang.org/protobuf/types/known/structpb
          - google.golang.org/protobuf/types/known/timestamppb
          - github.com/joho/godotenv
          - github.com/imran31415/gracewrap
          - github.com/golang-jwt/jwt/v5
          - golang.org/x/crypto/bcrypt
        deny:
          - pkg: "github.com/example/forbidden"
            desc: "This package is forbidden"

linters:
  enable:
    - bodyclose
    # - depguard
    - dogsled
    - dupl
    - errcheck
    - exhaustive
    - funlen
    - gochecknoinits
    - goconst
    - gocritic
    - gocyclo
    - gofmt
    - goimports
    - goprintffuncname
    - gosec
    - gosimple
    - govet
    - ineffassign
    - lll
    - misspell
    - mnd
    - nakedret
    - noctx
    - nolintlint
    - revive
    - rowserrcheck
    - staticcheck
    - stylecheck
    - typecheck
    - unconvert
    - unparam
    - unused
    - whitespace

  disable:
    - prealloc

  exclude-rules:
    - path: vendor/
      linters:
        - mnd
        - funlen
        - gocyclo
    - path: node_modules/
      linters:
        - mnd
        - funlen
        - gocyclo
    - path: frontend/node_modules/
      linters:
        - mnd
        - funlen
        - gocyclo
    - path: frontend/dist/
      linters:
        - mnd
        - funlen
        - gocyclo
    - path: bin/
      linters:
        - mnd
        - funlen
        - gocyclo
    - path: coverage-reports/
      linters:
        - mnd
        - funlen
        - gocyclo
    - path: ".*\\.pb\\.go$"
      linters:
        - mnd
        - funlen
        - gocyclo
        - revive
        - errcheck
        - goconst
        - unparam
        - typecheck
        - gosec
        - noctx
        - rowserrcheck
        - stylecheck
        - gocritic
        - gosimple
        - govet
        - ineffassign
        - misspell
        - nakedret
        - nolintlint
        - staticcheck
        - unconvert
        - unused
        - whitespace
    - path: _test\.go
      linters:
        - mnd
        - funlen
        - gocyclo
        - revive
        - errcheck
        - goconst
        - unparam
        - typecheck
        - gosec
        - noctx
        - rowserrcheck
        - stylecheck
        - gocritic
        - gosimple
        - govet
        - ineffassign
        - misspell
        - nakedret
        - nolintlint
        - staticcheck
        - unconvert
        - unused
        - whitespace
    - path: cmd/
      linters:
        - gochecknoinits
    - path: proto/
      linters:
        - golint
        - gosec
    - text: "Error return value of .((os\\.)?std(out|err)\\..*|.*Close|.*Flush|os\\.Remove(All)?|.*printf?|os\\.(Un)?Setenv). is not checked"
      linters:
        - errcheck
    - text: "exported (.+) should have comment or be unexported"
      linters:
        - revive
    - text: "should have a package comment"
      linters:
        - revive
    - text: "comment on exported"
      linters:
        - revive

  exclude-use-default: false
  max-issues-per-linter: 0
  max-same-issues: 0
