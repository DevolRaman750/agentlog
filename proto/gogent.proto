syntax = "proto3";

package gogent;

option go_package = "gogent/proto";

import "google/protobuf/timestamp.proto";
import "google/protobuf/struct.proto";

// =============================================================================
// USER AUTHENTICATION & MANAGEMENT
// =============================================================================

// User represents a user in the system
message User {
  string id = 1;
  string username = 2;
  string email = 3;
  bool email_verified = 4;
  bool is_temporary = 5;
  google.protobuf.Timestamp created_at = 6;
  google.protobuf.Timestamp updated_at = 7;
  google.protobuf.Timestamp last_login_at = 8;
}

// Authentication request for login
message LoginRequest {
  string username = 1;
  string password = 2;
}

// Authentication response with JWT token
message LoginResponse {
  string token = 1;
  User user = 2;
  google.protobuf.Timestamp expires_at = 3;
}

// Registration request
message RegisterRequest {
  string username = 1;
  string email = 2;
  string password = 3;
}

// Registration response
message RegisterResponse {
  User user = 1;
  string token = 2;
}

// Create temporary user request
message CreateTemporaryUserRequest {
  string session_id = 1; // Optional session ID from frontend
}

// Create temporary user response
message CreateTemporaryUserResponse {
  User user = 1;
  string temporary_password = 2;
  string token = 3;
}

// Save temporary account request
message SaveTemporaryAccountRequest {
  string email = 1;
  string current_password = 2;
}

// Save temporary account response
message SaveTemporaryAccountResponse {
  User user = 1;
  bool email_sent = 2;
}

// Verify email request
message VerifyEmailRequest {
  string token = 1;
}

// Verify email response
message VerifyEmailResponse {
  User user = 1;
  bool verified = 2;
}

// Get current user request
message GetCurrentUserRequest {}

// Get current user response
message GetCurrentUserResponse {
  User user = 1;
}

// =============================================================================
// EXECUTION MANAGEMENT
// =============================================================================

// Multi-variation execution request
message ExecuteRequest {
  string execution_run_name = 1;
  string description = 2;
  string base_prompt = 3;
  string context = 4;
  bool enable_function_calling = 5;
  repeated APIConfiguration configurations = 6;
  repeated Tool function_tools = 7;
  ComparisonConfig comparison_config = 8;
  bool use_mock = 9;
  // Session-based API keys (not stored on backend)
  map<string, string> session_api_keys = 15; // All API keys for this session (gemini, openweather, neo4j, etc.)
  // Legacy fields - deprecated, use session_api_keys instead
  string openweather_api_key = 10 [deprecated = true];
  string neo4j_url = 11 [deprecated = true];
  string neo4j_username = 12 [deprecated = true];
  string neo4j_password = 13 [deprecated = true];
  string neo4j_database = 14 [deprecated = true];
}

// Execute response with execution ID
message ExecuteResponse {
  string execution_id = 1;
  string message = 2;
  ExecutionRun execution_run = 3;
}

// Get execution status request
message GetExecutionStatusRequest {
  string execution_id = 1;
}

// Get execution status response
message GetExecutionStatusResponse {
  string status = 1; // pending, running, completed, failed
  string error_message = 2;
  google.protobuf.Timestamp start_time = 3;
  google.protobuf.Timestamp end_time = 4;
  ExecutionResult result = 5; // Only populated when completed
}

// Get execution result request
message GetExecutionResultRequest {
  string execution_run_id = 1;
}

// Get execution result response
message GetExecutionResultResponse {
  ExecutionResult result = 1;
}

// List execution runs request
message ListExecutionRunsRequest {
  int32 limit = 1;
  int32 offset = 2;
}

// List execution runs response
message ListExecutionRunsResponse {
  repeated ExecutionRun execution_runs = 1;
  int32 total_count = 2;
}

// Delete execution run request
message DeleteExecutionRunRequest {
  string execution_run_id = 1;
}

// Delete execution run response
message DeleteExecutionRunResponse {
  string message = 1;
}

// =============================================================================
// CONFIGURATION MANAGEMENT
// =============================================================================

// List configurations request
message ListConfigurationsRequest {}

// List configurations response
message ListConfigurationsResponse {
  repeated APIConfiguration configurations = 1;
}

// Create configuration request
message CreateConfigurationRequest {
  APIConfiguration configuration = 1;
}

// Create configuration response
message CreateConfigurationResponse {
  APIConfiguration configuration = 1;
}

// Update configuration request
message UpdateConfigurationRequest {
  string id = 1;
  APIConfiguration configuration = 2;
}

// Update configuration response
message UpdateConfigurationResponse {
  APIConfiguration configuration = 1;
}

// Delete configuration request
message DeleteConfigurationRequest {
  string id = 1;
}

// Delete configuration response
message DeleteConfigurationResponse {
  string message = 1;
}

// =============================================================================
// FUNCTION MANAGEMENT
// =============================================================================

// List functions request
message ListFunctionsRequest {}

// List functions response
message ListFunctionsResponse {
  repeated FunctionDefinition functions = 1;
}

// Get function by ID request
message GetFunctionRequest {
  string id = 1;
}

// Get function by ID response
message GetFunctionResponse {
  FunctionDefinition function = 1;
}

// Create function request
message CreateFunctionRequest {
  FunctionDefinition function = 1;
}

// Create function response
message CreateFunctionResponse {
  FunctionDefinition function = 1;
}

// Update function request
message UpdateFunctionRequest {
  string id = 1;
  FunctionDefinition function = 2;
}

// Update function response
message UpdateFunctionResponse {
  FunctionDefinition function = 1;
}

// Delete function request
message DeleteFunctionRequest {
  string id = 1;
}

// Delete function response
message DeleteFunctionResponse {
  string message = 1;
}

// Test function request
message TestFunctionRequest {
  string function_id = 1;
  google.protobuf.Struct arguments = 2;
  bool use_mock_data = 3;
  int32 timeout_ms = 4;
}

// Test function response
message TestFunctionResponse {
  bool success = 1;
  bool used_mock_data = 2;
  int32 execution_time_ms = 3;
  google.protobuf.Struct response = 4;
  string error_message = 5;
}

// =============================================================================
// DATABASE MANAGEMENT
// =============================================================================

// Get database stats request
message GetDatabaseStatsRequest {}

// Get database stats response
message GetDatabaseStatsResponse {
  int32 total_execution_runs = 1;
  int32 total_api_requests = 2;
  int32 total_api_responses = 3;
  int32 total_function_calls = 4;
  double avg_response_time = 5;
  double success_rate = 6;
}

// List database tables request
message ListDatabaseTablesRequest {}

// List database tables response
message ListDatabaseTablesResponse {
  repeated string tables = 1;
}

// Get table data request
message GetTableDataRequest {
  string table_name = 1;
  int32 limit = 2;
  int32 offset = 3;
}

// Get table data response
message GetTableDataResponse {
  string table_name = 1;
  repeated string columns = 2;
  repeated google.protobuf.ListValue rows = 3;
  int32 total_rows = 4;
}

// =============================================================================
// HEALTH & SYSTEM
// =============================================================================

// Health check request
message HealthRequest {}

// Health check response
message HealthResponse {
  string status = 1;
  string version = 2;
  google.protobuf.Timestamp timestamp = 3;
  bool database = 4;
  bool gemini_api = 5;
}

// =============================================================================
// DATA TYPES
// =============================================================================

// Execution run represents a group of related API calls
message ExecutionRun {
  string id = 1;
  string user_id = 2;
  string name = 3;
  string description = 4;
  bool enable_function_calling = 5;
  string status = 6; // pending, running, completed, failed
  string error_message = 7;
  google.protobuf.Timestamp created_at = 8;
  google.protobuf.Timestamp updated_at = 9;
}

// API configuration for multi-variation execution
message APIConfiguration {
  string id = 1;
  string user_id = 2;
  string variation_name = 3;
  string model_name = 4;
  string system_prompt = 5;
  float temperature = 6;
  int32 max_tokens = 7;
  float top_p = 8;
  int32 top_k = 9;
  google.protobuf.Struct safety_settings = 10;
  google.protobuf.Struct generation_config = 11;
  repeated Tool tools = 12;
  google.protobuf.Struct tool_config = 13;
  google.protobuf.Timestamp created_at = 14;
  google.protobuf.Timestamp updated_at = 15;
}

// Tool definition for function calling
message Tool {
  string name = 1;
  string description = 2;
  google.protobuf.Struct parameters = 3;
}

// Function definition
message FunctionDefinition {
  string id = 1;
  string user_id = 2;
  string name = 3;
  string display_name = 4;
  string description = 5;
  string function_group = 17; // Group functions by category (e.g., "graph", "weather", "github")
  google.protobuf.Struct parameters_schema = 6;
  google.protobuf.Struct mock_response = 7;
  string endpoint_url = 8;
  string http_method = 9;
  google.protobuf.Struct headers = 10;
  google.protobuf.Struct auth_config = 11;
  bool is_active = 12;
  repeated string required_api_keys = 15; // API keys required for this function
  google.protobuf.Struct api_key_validation = 16; // Validation rules for each API key
  google.protobuf.Timestamp created_at = 13;
  google.protobuf.Timestamp updated_at = 14;
}

// API request
message APIRequest {
  string id = 1;
  string execution_run_id = 2;
  string configuration_id = 3;
  string request_type = 4; // generate, chat, function_call
  string prompt = 5;
  string context = 6;
  string function_name = 7;
  google.protobuf.Struct function_parameters = 8;
  google.protobuf.Struct request_headers = 9;
  google.protobuf.Struct request_body = 10;
  google.protobuf.Timestamp created_at = 11;
}

// API response
message APIResponse {
  string id = 1;
  string request_id = 2;
  string response_status = 3; // success, error, timeout
  string response_text = 4;
  google.protobuf.Struct function_call_response = 5;
  google.protobuf.Struct usage_metadata = 6;
  google.protobuf.Struct safety_ratings = 7;
  string finish_reason = 8;
  string error_message = 9;
  int32 response_time_ms = 10;
  google.protobuf.Struct response_headers = 11;
  google.protobuf.Struct response_body = 12;
  google.protobuf.Timestamp created_at = 13;
}

// Function call
message FunctionCall {
  string id = 1;
  string request_id = 2;
  string function_name = 3;
  google.protobuf.Struct function_arguments = 4;
  google.protobuf.Struct function_response = 5;
  string execution_status = 6; // pending, success, error
  int32 execution_time_ms = 7;
  string error_details = 8;
  google.protobuf.Timestamp created_at = 9;
}

// Execution result
message ExecutionResult {
  ExecutionRun execution_run = 1;
  repeated VariationResult results = 2;
  ComparisonResult comparison = 3;
  int64 total_time = 4; // milliseconds
  int32 success_count = 5;
  int32 error_count = 6;
  repeated ExecutionLog logs = 7;
}

// Variation result
message VariationResult {
  APIConfiguration configuration = 1;
  APIRequest request = 2;
  APIResponse response = 3;
  repeated FunctionCall function_calls = 4;
  int64 execution_time = 5; // milliseconds
}

// Comparison result
message ComparisonResult {
  string id = 1;
  string execution_run_id = 2;
  string comparison_type = 3;
  string metric_name = 4;
  google.protobuf.Struct configuration_scores = 5;
  string best_configuration_id = 6;
  APIConfiguration best_configuration = 7;
  repeated APIConfiguration all_configurations = 8;
  string analysis_notes = 9;
  google.protobuf.Timestamp created_at = 10;
}

// Execution log
message ExecutionLog {
  string id = 1;
  string execution_run_id = 2;
  string configuration_id = 3;
  string request_id = 4;
  string log_level = 5; // INFO, DEBUG, WARN, ERROR, SUCCESS
  string log_category = 6; // SETUP, EXECUTION, FUNCTION_CALL, API_CALL, COMPLETION, ERROR
  string message = 7;
  google.protobuf.Struct details = 8;
  google.protobuf.Timestamp timestamp = 9;
}

// Comparison config
message ComparisonConfig {
  bool enabled = 1;
  repeated string metrics = 2;
  repeated string custom_rules = 3;
}

// =============================================================================
// EXECUTION TEMPLATES
// =============================================================================

// Execution template definition
message ExecutionTemplate {
  string id = 1;
  string user_id = 2;
  string name = 3;
  string description = 4;
  string template_prompt = 5;
  string context_template = 6;
  bool enable_function_calling = 7;
  bool is_active = 8;
  bool is_public = 9;
  string category = 10;
  google.protobuf.Struct tags = 11;
  int32 execution_timeout_seconds = 12;
  
  // Rate limiting configuration
  int32 rate_limit_per_hour = 13;
  int32 rate_limit_per_day = 14;
  int32 rate_limit_burst = 15;
  
  // Usage tracking
  int32 total_executions = 16;
  google.protobuf.Timestamp last_executed_at = 17;
  
  google.protobuf.Timestamp created_at = 18;
  google.protobuf.Timestamp updated_at = 19;
  
  // Populated from joins
  repeated ExecutionTemplateParameter parameters = 20;
  repeated ExecutionTemplateAuthToken auth_tokens = 21;
}

// Template parameter definition
message ExecutionTemplateParameter {
  string id = 1;
  string template_id = 2;
  string parameter_name = 3;
  string parameter_type = 4; // string, number, boolean, array, object
  string description = 5;
  string default_value = 6;
  bool is_required = 7;
  google.protobuf.Struct validation_rules = 8;
  google.protobuf.Struct allowed_values = 9;
  bool allow_sql_keywords = 10;
  bool allow_special_chars = 11;
  bool sanitize_html = 12;
  int32 display_order = 13;
  string ui_component = 14; // text, textarea, select, etc.
  string placeholder_text = 15;
  string help_text = 16;
  google.protobuf.Timestamp created_at = 17;
  google.protobuf.Timestamp updated_at = 18;
}

// Authentication token for public API access
message ExecutionTemplateAuthToken {
  string id = 1;
  string template_id = 2;
  string user_id = 3;
  string token_value = 4;
  string token_name = 5;
  string description = 6;
  bool is_active = 7;
  google.protobuf.Timestamp expires_at = 8;
  
  // Rate limiting overrides
  int32 custom_rate_limit_per_hour = 9;
  int32 custom_rate_limit_per_day = 10;
  int32 custom_rate_limit_burst = 11;
  
  // Usage tracking
  int32 total_uses = 12;
  google.protobuf.Timestamp last_used_at = 13;
  string last_used_ip = 14;
  
  // Security
  google.protobuf.Struct allowed_origins = 15;
  google.protobuf.Struct allowed_ips = 16;
  
  google.protobuf.Timestamp created_at = 17;
  google.protobuf.Timestamp updated_at = 18;
}

// Template version for history tracking
message ExecutionTemplateVersion {
  string id = 1;
  string template_id = 2;
  int32 version_number = 3;
  string user_id = 4;
  string name = 5;
  string description = 6;
  string template_prompt = 7;
  string context_template = 8;
  bool enable_function_calling = 9;
  string category = 10;
  google.protobuf.Struct tags = 11;
  int32 rate_limit_per_hour = 12;
  int32 rate_limit_per_day = 13;
  int32 rate_limit_burst = 14;
  string change_summary = 15;
  string change_type = 16; // create, update, restore
  bool is_current_version = 17;
  google.protobuf.Timestamp created_at = 18;
  repeated ExecutionTemplateParameter parameters = 19;
}

// Template execution record
message ExecutionTemplateExecution {
  string id = 1;
  string template_id = 2;
  string template_version_id = 3;
  string auth_token_id = 4;
  string execution_run_id = 5;
  google.protobuf.Struct parameters_provided = 6;
  string resolved_prompt = 7;
  string resolved_context = 8;
  string request_ip = 9;
  string user_agent = 10;
  string referer = 11;
  string status = 12; // pending, running, completed, failed, rate_limited
  string error_message = 13;
  int32 execution_time_ms = 14;
  google.protobuf.Timestamp created_at = 15;
  google.protobuf.Timestamp completed_at = 16;
}

// Template analytics
message ExecutionTemplateAnalytics {
  string template_id = 1;
  int32 total_executions = 2;
  int32 successful_executions = 3;
  int32 failed_executions = 4;
  int32 rate_limited_executions = 5;
  double average_execution_time_ms = 6;
  google.protobuf.Struct usage_by_day = 7;
  google.protobuf.Struct top_parameters = 8;
  google.protobuf.Struct error_breakdown = 9;
}

// =============================================================================
// EXECUTION TEMPLATE REQUESTS & RESPONSES
// =============================================================================

// List execution templates
message ListExecutionTemplatesRequest {
  int32 limit = 1;
  int32 offset = 2;
  string category = 3;
  bool include_public = 4;
  bool include_inactive = 5;
}

message ListExecutionTemplatesResponse {
  repeated ExecutionTemplate templates = 1;
  int32 total_count = 2;
}

// Get execution template by ID
message GetExecutionTemplateRequest {
  string id = 1;
  bool include_parameters = 2;
  bool include_tokens = 3;
}

message GetExecutionTemplateResponse {
  ExecutionTemplate template = 1;
}

// Create execution template
message CreateExecutionTemplateRequest {
  ExecutionTemplate template = 1;
  repeated ExecutionTemplateParameter parameters = 2;
}

message CreateExecutionTemplateResponse {
  ExecutionTemplate template = 1;
}

// Update execution template
message UpdateExecutionTemplateRequest {
  string id = 1;
  ExecutionTemplate template = 2;
  repeated ExecutionTemplateParameter parameters = 3;
  string change_summary = 4;
}

message UpdateExecutionTemplateResponse {
  ExecutionTemplate template = 1;
  ExecutionTemplateVersion version = 2;
}

// Delete execution template
message DeleteExecutionTemplateRequest {
  string id = 1;
}

message DeleteExecutionTemplateResponse {
  string message = 1;
}

// Execute template (public API)
message ExecuteTemplateRequest {
  string template_id = 1;
  string auth_token = 2; // Required for public API
  google.protobuf.Struct parameters = 3;
  string client_ip = 4; // Set by server
  string user_agent = 5; // Set by server
  string referer = 6; // Set by server
}

message ExecuteTemplateResponse {
  string execution_id = 1;
  string template_execution_id = 2;
  ExecutionRun execution_run = 3;
  string message = 4;
  bool rate_limited = 5;
  int32 rate_limit_remaining = 6;
  google.protobuf.Timestamp rate_limit_reset_at = 7;
}

// Get template execution status
message GetTemplateExecutionStatusRequest {
  string template_execution_id = 1;
  string auth_token = 2; // Required for public API
}

message GetTemplateExecutionStatusResponse {
  ExecutionTemplateExecution execution = 1;
  ExecutionResult result = 2; // Only when completed
}

// Template version management
message GetTemplateVersionsRequest {
  string template_id = 1;
  int32 limit = 2;
  int32 offset = 3;
}

message GetTemplateVersionsResponse {
  repeated ExecutionTemplateVersion versions = 1;
  int32 total_count = 2;
}

message RestoreTemplateVersionRequest {
  string template_id = 1;
  int32 version_number = 2;
  string change_summary = 3;
}

message RestoreTemplateVersionResponse {
  ExecutionTemplate template = 1;
  ExecutionTemplateVersion new_version = 2;
}

// Auth token management
message CreateTemplateAuthTokenRequest {
  string template_id = 1;
  ExecutionTemplateAuthToken token = 2;
}

message CreateTemplateAuthTokenResponse {
  ExecutionTemplateAuthToken token = 1;
}

message ListTemplateAuthTokensRequest {
  string template_id = 1;
  bool include_inactive = 2;
}

message ListTemplateAuthTokensResponse {
  repeated ExecutionTemplateAuthToken tokens = 1;
}

message UpdateTemplateAuthTokenRequest {
  string token_id = 1;
  ExecutionTemplateAuthToken token = 2;
}

message UpdateTemplateAuthTokenResponse {
  ExecutionTemplateAuthToken token = 1;
}

message DeleteTemplateAuthTokenRequest {
  string token_id = 1;
}

message DeleteTemplateAuthTokenResponse {
  string message = 1;
}

// Template analytics
message GetTemplateAnalyticsRequest {
  string template_id = 1;
  google.protobuf.Timestamp start_date = 2;
  google.protobuf.Timestamp end_date = 3;
}

message GetTemplateAnalyticsResponse {
  ExecutionTemplateAnalytics analytics = 1;
}

// Template execution history
message GetTemplateExecutionHistoryRequest {
  string template_id = 1;
  int32 limit = 2;
  int32 offset = 3;
  string status_filter = 4;
  google.protobuf.Timestamp start_date = 5;
  google.protobuf.Timestamp end_date = 6;
}

message GetTemplateExecutionHistoryResponse {
  repeated ExecutionTemplateExecution executions = 1;
  int32 total_count = 2;
}

// =============================================================================
// GRPC SERVICE DEFINITIONS
// =============================================================================

// Main gogent service
service GogentService {
  // Authentication & User Management
  rpc Login(LoginRequest) returns (LoginResponse);
  rpc Register(RegisterRequest) returns (RegisterResponse);
  rpc CreateTemporaryUser(CreateTemporaryUserRequest) returns (CreateTemporaryUserResponse);
  rpc SaveTemporaryAccount(SaveTemporaryAccountRequest) returns (SaveTemporaryAccountResponse);
  rpc VerifyEmail(VerifyEmailRequest) returns (VerifyEmailResponse);
  rpc GetCurrentUser(GetCurrentUserRequest) returns (GetCurrentUserResponse);

  // Execution Management
  rpc Execute(ExecuteRequest) returns (ExecuteResponse);
  rpc GetExecutionStatus(GetExecutionStatusRequest) returns (GetExecutionStatusResponse);
  rpc GetExecutionResult(GetExecutionResultRequest) returns (GetExecutionResultResponse);
  rpc ListExecutionRuns(ListExecutionRunsRequest) returns (ListExecutionRunsResponse);
  rpc DeleteExecutionRun(DeleteExecutionRunRequest) returns (DeleteExecutionRunResponse);

  // Configuration Management
  rpc ListConfigurations(ListConfigurationsRequest) returns (ListConfigurationsResponse);
  rpc CreateConfiguration(CreateConfigurationRequest) returns (CreateConfigurationResponse);
  rpc UpdateConfiguration(UpdateConfigurationRequest) returns (UpdateConfigurationResponse);
  rpc DeleteConfiguration(DeleteConfigurationRequest) returns (DeleteConfigurationResponse);

  // Function Management
  rpc ListFunctions(ListFunctionsRequest) returns (ListFunctionsResponse);
  rpc GetFunction(GetFunctionRequest) returns (GetFunctionResponse);
  rpc CreateFunction(CreateFunctionRequest) returns (CreateFunctionResponse);
  rpc UpdateFunction(UpdateFunctionRequest) returns (UpdateFunctionResponse);
  rpc DeleteFunction(DeleteFunctionRequest) returns (DeleteFunctionResponse);
  rpc TestFunction(TestFunctionRequest) returns (TestFunctionResponse);

  // Database Management
  rpc GetDatabaseStats(GetDatabaseStatsRequest) returns (GetDatabaseStatsResponse);
  rpc ListDatabaseTables(ListDatabaseTablesRequest) returns (ListDatabaseTablesResponse);
  rpc GetTableData(GetTableDataRequest) returns (GetTableDataResponse);

  // Health & System
  rpc Health(HealthRequest) returns (HealthResponse);

  // Execution Template Management (Authenticated Users)
  rpc ListExecutionTemplates(ListExecutionTemplatesRequest) returns (ListExecutionTemplatesResponse);
  rpc GetExecutionTemplate(GetExecutionTemplateRequest) returns (GetExecutionTemplateResponse);
  rpc CreateExecutionTemplate(CreateExecutionTemplateRequest) returns (CreateExecutionTemplateResponse);
  rpc UpdateExecutionTemplate(UpdateExecutionTemplateRequest) returns (UpdateExecutionTemplateResponse);
  rpc DeleteExecutionTemplate(DeleteExecutionTemplateRequest) returns (DeleteExecutionTemplateResponse);

  // Template Execution (Public API with token auth)
  rpc ExecuteTemplate(ExecuteTemplateRequest) returns (ExecuteTemplateResponse);
  rpc GetTemplateExecutionStatus(GetTemplateExecutionStatusRequest) returns (GetTemplateExecutionStatusResponse);

  // Template Version Management
  rpc GetTemplateVersions(GetTemplateVersionsRequest) returns (GetTemplateVersionsResponse);
  rpc RestoreTemplateVersion(RestoreTemplateVersionRequest) returns (RestoreTemplateVersionResponse);

  // Template Auth Token Management
  rpc CreateTemplateAuthToken(CreateTemplateAuthTokenRequest) returns (CreateTemplateAuthTokenResponse);
  rpc ListTemplateAuthTokens(ListTemplateAuthTokensRequest) returns (ListTemplateAuthTokensResponse);
  rpc UpdateTemplateAuthToken(UpdateTemplateAuthTokenRequest) returns (UpdateTemplateAuthTokenResponse);
  rpc DeleteTemplateAuthToken(DeleteTemplateAuthTokenRequest) returns (DeleteTemplateAuthTokenResponse);

  // Template Analytics & History
  rpc GetTemplateAnalytics(GetTemplateAnalyticsRequest) returns (GetTemplateAnalyticsResponse);
  rpc GetTemplateExecutionHistory(GetTemplateExecutionHistoryRequest) returns (GetTemplateExecutionHistoryResponse);
} 